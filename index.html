<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwiftCart | Online Shopping</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="logo">SwiftCart</div>
      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li class="dropdown">
          <a href="#" id="dropdownToggle">Categories ▾</a>
          <ul class="dropdown-menu" id="dropdownMenu">
            <li><a href="#">Electronics</a></li>
            <li><a href="#">Fashion</a></li>
            <li><a href="#">Groceries</a></li>
          </ul>
        </li>
        <li><a href="#">Deals</a></li>
        <li><a href="#">Contact</a></li>
        <li><a href="#" class="cart-btn">🛒 Cart</a></li>
      </ul>
    </nav>

    <div class="hero">
      <h1>Welcome to SwiftCart</h1>
      <a href="#" class="cta-button">Shop Now</a>
    </div>
  </header>

  <section class="products">
    <h2>Featured Products</h2>
    <div class="product-grid">
      <div class="product-card">
        <img src="images/product1.png" alt="Product 1" />
        <h3>Smartphone</h3>
        <p>&#2547; 152,500</p>
        <button>Add to Cart</button>
      </div>
      <div class="product-card">
        <img src="images/product2.png" alt="Product 2" />
        <h3>Smart Watch</h3>
        <p>&#2547; 19,500</p>
        <button>Add to Cart</button>
      </div>
      <div class="product-card">
        <img src="images/product3.png" alt="Product 3" />
        <h3>Gadgets</h3>
        <p>&#2547; 24,500</p>
        <button>Add to Cart</button>
      </div>
    </div>
  </section>

  <footer>
  <p>&copy; 2025 SwiftCart. All rights reserved.</p>
  <div class="social-links">
    <a href="https://www.facebook.com" target="_blank">Facebook</a>
    <a href="https://www.twitter.com" target="_blank">Twitter</a>
  </div>
</footer>

  <script src="script.js"></script>
</body>
</html>
